name: Knight Capital Advanced Guard

on: [push, pull_request]

jobs:
  comprehensive-check:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 2. Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 🔥 LAYER 1: FAST FAIL
 # - name: Layer 1 - Scan dangerous keyword
      #   run: |
      #     echo "Scanning..."
      #     if grep -r "activatePowerPegMode" src/main/java; then
      #       exit 1
      #     fi

      # 🧠 LAYER 2: SONARCLOUD
      - name: Layer 2 - SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
         -Dsonar.projectKey=thinhle287_knight-capital-demo \
         -Dsonar.organization=thinhle287 \


      # 📦 BUILD
      - name: Build project
        run: mvn -B package --file pom.xml